stages:
  - build
  - release

variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/glosso-studio/${CI_COMMIT_TAG}"

build_job:
  stage: build
  image: openjdk:17-jdk-slim
  before_script:
    - apt-get update && apt-get install -y git
    - export GRADLE_USER_HOME=$(pwd)/.gradle
    - chmod +x gradlew
    # Create the keystore file from base64 variable
    - if [ -n "$SIGNING_KEY_BASE64" ]; then echo "$SIGNING_KEY_BASE64" | base64 -d > release.keystore; export SIGNING_STORE_FILE=release.keystore; fi
  script:
    - ./gradlew :androidApp:assembleRelease
  artifacts:
    paths:
      - androidApp/build/outputs/apk/release/*.apk
    expire_in: 1 week
  only:
    - tags

release_job:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - build_job
  only:
    - tags
  before_script:
    - apk add --no-cache curl git
  script:
    - APK_FILE=$(ls androidApp/build/outputs/apk/release/*.apk | head -n 1)
    - APK_FILENAME=$(basename $APK_FILE)
    - echo "Uploading APK: ${APK_FILENAME}"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "${APK_FILE}" \
           "${PACKAGE_REGISTRY_URL}/${APK_FILENAME}"
    # Explicitly upload the model and phone files
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/allosaurus_eng2102.onnx" \
           "${PACKAGE_REGISTRY_URL}/allosaurus_eng2102.onnx"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/phone_eng.txt" \
           "${PACKAGE_REGISTRY_URL}/phone_eng.txt"
    # Explicitly upload the databases
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/sentences_0.db" \
           "${PACKAGE_REGISTRY_URL}/sentences_0.db"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/sentences_1.db" \
           "${PACKAGE_REGISTRY_URL}/sentences_1.db"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/sentences_2.db" \
           "${PACKAGE_REGISTRY_URL}/sentences_2.db"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/sentences_3.db" \
           "${PACKAGE_REGISTRY_URL}/sentences_3.db"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/sentences_4.db" \
           "${PACKAGE_REGISTRY_URL}/sentences_4.db"
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file "data/sentences_5.db" \
           "${PACKAGE_REGISTRY_URL}/sentences_5.db"
  release:
    name: 'Release v${CI_COMMIT_TAG}'
    description: 'Release created from tag ${CI_COMMIT_TAG}'
    tag_name: '${CI_COMMIT_TAG}'
    assets:
      links:
        - name: 'glosso-studio-v1.0.4-${CI_COMMIT_SHORT_SHA}.apk'
          url: '${PACKAGE_REGISTRY_URL}/glosso-studio-v1.0.4-${CI_COMMIT_SHORT_SHA}.apk'
          link_type: 'package'
        - name: 'allosaurus_eng2102.onnx'
          url: '${PACKAGE_REGISTRY_URL}/allosaurus_eng2102.onnx'
        - name: 'phone_eng.txt'
          url: '${PACKAGE_REGISTRY_URL}/phone_eng.txt'
        - name: 'sentences_0.db'
          url: '${PACKAGE_REGISTRY_URL}/sentences_0.db'
        - name: 'sentences_1.db'
          url: '${PACKAGE_REGISTRY_URL}/sentences_1.db'
        - name: 'sentences_2.db'
          url: '${PACKAGE_REGISTRY_URL}/sentences_2.db'
        - name: 'sentences_3.db'
          url: '${PACKAGE_REGISTRY_URL}/sentences_3.db'
        - name: 'sentences_4.db'
          url: '${PACKAGE_REGISTRY_URL}/sentences_4.db'
        - name: 'sentences_5.db'
          url: '${PACKAGE_REGISTRY_URL}/sentences_5.db'
